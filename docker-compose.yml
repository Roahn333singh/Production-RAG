version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=rag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
    environment:
      # Automatically map connection so FastAPI doesn't crash looking for "localhost" in Docker!
      - DB_URL=postgresql://admin:password@postgres:5432/rag_db

volumes:
  postgres_data:
